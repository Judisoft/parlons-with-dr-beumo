services:

  mysql:
    image: mysql:8.2
    container_name: parlons_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    image: kumjude/french-tutor-backend:latest
    container_name: parlons_backend
    restart: unless-stopped
    environment:
      NODE_ENV:    production
      PORT:        4000
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_NAME:     ${MYSQL_DATABASE}
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  web:
    image: kumjude/french-tutor-frontend:latest
    container_name: parlons_web
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: parlons_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - internal

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
